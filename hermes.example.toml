# Hermes-RS Configuration Example

# Model configuration
model = "gpt-4"
max_iterations = 20
tool_timeout = 30

# API configuration (can also use environment variables)
# api_key = "your_api_key_here"
base_url = "https://api.openai.com/v1"

# Context window size
context_window = 128000

# System prompt (optional)
# system_prompt = """
# You are Hermes, an advanced AI assistant with access to various tools.
# Use tools when needed to help the user accomplish their goals.
# """

# Logging configuration
[logging]
level = "info"
format = "json"  # or "pretty"
with_target = true
with_thread_ids = true
