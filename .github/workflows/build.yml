name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Native builds (compile + run on same arch) ───────────────────
  native:
    name: Native (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hermes-linux-x86_64

          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: hermes-macos-arm64

          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hermes-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/hermes
            target/${{ matrix.target }}/release/hermes.exe
          if-no-files-found: ignore

  # ─── Cross-compiled builds (exotic targets via `cross`) ───────────
  cross:
    name: Cross (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Alpine / Static binaries (musl) ──
          # Production Docker scratch containers, minimal distros
          - name: Linux x86_64 musl
            target: x86_64-unknown-linux-musl
            artifact: hermes-linux-x86_64-musl

          - name: Linux ARM64 musl
            target: aarch64-unknown-linux-musl
            artifact: hermes-linux-arm64-musl

          # ── Raspberry Pi / ARM servers ──
          # RPi 4/5, AWS Graviton, Oracle Ampere, Hetzner ARM
          - name: Linux ARM64 (RPi4/5, Graviton)
            target: aarch64-unknown-linux-gnu
            artifact: hermes-linux-arm64

          # RPi 2/3, older ARM SBCs
          - name: Linux ARMv7 (RPi2/3)
            target: armv7-unknown-linux-gnueabihf
            artifact: hermes-linux-armv7

          # ── Android ──
          - name: Android ARM64
            target: aarch64-linux-android
            artifact: hermes-android-arm64

          # ── FreeBSD ──
          # Server/NAS deployments, TrueNAS, OPNsense
          - name: FreeBSD x86_64
            target: x86_64-unknown-freebsd
            artifact: hermes-freebsd-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (release)
        run: cross build --workspace --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/hermes
          if-no-files-found: ignore
